<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Swarm Dashboard - Tactical Hologram</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: monospace; color: #00ffcc; }
        #ui-container { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,20,40,0.8); padding: 15px; border: 1px solid #00ffcc; width: 230px; }
        h3 { margin: 0 0 10px 0; }
        select, button, input { background: #001122; color: #00ffcc; border: 1px solid #00ffcc; padding: 5px; margin: 4px 0; cursor: pointer; width: 100%; box-sizing: border-box; }
        button:hover { background: #00ffcc; color: #001122; }
        .slider-container { margin-top: 15px; }
        .hint { font-size: 11px; opacity: 0.7; margin-top: 10px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <h3>Tactical Dashboard</h3>
        <select id="scenario-select">
            <option value="cyber_city">Cyber-City (Animation)</option>
            <option value="torture_track">Torture Track (Gap Test)</option>
            <option value="csg_maze">CSG Maze (Stress Phase 2)</option>
            <option value="stress_phase1_k0">Stress Phase 1 (k=0)</option>
            <option value="stress_phase1_k2">Stress Phase 1 (k=2)</option>
            <option value="stress_phase1_k4">Stress Phase 1 (k=4)</option>
            <option value="stress_phase1_k6">Stress Phase 1 (k=6)</option>
            <option value="stress_phase1_k8">Stress Phase 1 (k=8)</option>
        </select>

        <button id="cam-free">Camera: Free Roam</button>
        <button id="cam-3rd">Camera: 3rd Person</button>
        <button id="cam-1st">Camera: 1st Person</button>
        <button id="math-mode-btn">Toggle Math Mode (Off)</button>

        <div id="gap-test-controls" style="display:none; margin-top:10px; border-top:1px solid #00ffcc; padding-top:10px;">
            <label>Solver Mode:</label>
            <select id="solver-select">
                <option value="both">Both</option>
                <option value="scp">SCP Only</option>
                <option value="cbs">CBS Only</option>
            </select>
            <div id="merge-container" style="margin-top:5px;">
                <input type="checkbox" id="merge-times" checked> <label>Merge Times</label>
            </div>
        </div>

        <div id="slider-area" style="margin-top:10px;">
            <label>Time (T): <span id="time-val">0</span></label>
            <input type="range" id="time-slider" min="0" max="99" value="0" step="0.1">
            
            <div id="cbs-slider-area" style="display:none; margin-top:5px;">
                <label>CBS Time (T): <span id="cbs-time-val">0</span></label><br>
                <input type="range" id="cbs-time-slider" min="0" max="99" value="0" step="0.1">
            </div>
        </div>

        <div class="hint">Math Mode: click a drone to project its KKT tangent plane onto nearby CSG surfaces.</div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
